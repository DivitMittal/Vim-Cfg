name: vim-cfg
version: 1.0.0
description: Dual Vim/Neovim configuration (NvChad-based Lua + vimscript) deployed via Nix flakes
author: DivitMittal
license: MIT
target: all
type: instructions

dependencies:
  mcp:
    - name: serena
      registry: false
      transport: stdio
      command: uvx
      args:
        - --from
        - git+https://github.com/oraios/serena
        - serena
        - start-mcp-server
        - --context
        - claude-code
        - --project
        - ~/Projects/Cfgs/Vim-Cfg/
